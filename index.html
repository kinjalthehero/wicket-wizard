<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0a0a1a">
  <title>Wicket Wizard</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0a0a1a;
      color: #e0e0ff;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      -webkit-overflow-scrolling: touch;
    }

    .bg-glow {
      position: fixed;
      top: -40%;
      left: -20%;
      width: 140%;
      height: 140%;
      background: radial-gradient(ellipse at 30% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 60%),
                  radial-gradient(ellipse at 70% 80%, rgba(236, 72, 153, 0.1) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 12px 14px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #818cf8, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-align: center;
    }

    h1 span {
      display: block;
      font-size: 0.6rem;
      font-weight: 400;
      letter-spacing: 3px;
      text-transform: uppercase;
      -webkit-text-fill-color: #8888aa;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 16px;
      padding: 14px 16px;
      backdrop-filter: blur(12px);
    }

    .card-label {
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8888aa;
      margin-bottom: 4px;
    }

    /* Score Section */
    .score-display {
      font-size: 4.5rem;
      font-weight: 800;
      text-align: center;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 30px rgba(129, 140, 248, 0.2);
      padding: 4px 0 10px;
      font-variant-numeric: tabular-nums;
    }

    .score-buttons {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 72px;
      gap: 10px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, box-shadow 0.15s;
      font-family: inherit;
      min-height: 46px;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn-run {
      padding: 14px 0;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #4f52b5, #6d5eaa);
      color: #e0e0ff;
      box-shadow: 0 2px 12px rgba(79, 82, 181, 0.2);
    }

    .btn-run:active {
      box-shadow: 0 1px 6px rgba(79, 82, 181, 0.3);
    }

    .btn-four {
      background: linear-gradient(135deg, #b8860b, #a07608);
      box-shadow: 0 2px 12px rgba(184, 134, 11, 0.2);
    }

    .btn-four:active {
      box-shadow: 0 1px 6px rgba(184, 134, 11, 0.3);
    }

    .btn-six {
      background: linear-gradient(135deg, #0d8c6a, #0a7558);
      box-shadow: 0 2px 12px rgba(13, 140, 106, 0.2);
    }

    .btn-six:active {
      box-shadow: 0 1px 6px rgba(13, 140, 106, 0.3);
    }

    .btn-minus {
      padding: 14px 0;
      font-size: 1.2rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
    }

    /* Wickets Section */
    .wickets-display {
      font-size: 3rem;
      font-weight: 800;
      text-align: center;
      line-height: 1;
      color: #fff;
      text-shadow: 0 0 20px rgba(180, 90, 20, 0.2);
      padding: 4px 0 10px;
      font-variant-numeric: tabular-nums;
    }

    .btn-wicket {
      flex: 1;
      padding: 14px 0;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #b05a10, #964d0e);
      color: #e0d0c0;
      box-shadow: 0 2px 12px rgba(176, 90, 16, 0.2);
    }

    .btn-wicket:active {
      box-shadow: 0 1px 6px rgba(176, 90, 16, 0.3);
    }

    .btn-wicket-undo {
      width: 64px;
      padding: 14px 0;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
    }

    /* Overs Section */
    .overs-display {
      text-align: center;
      padding: 4px 0 10px;
    }

    .overs-big {
      font-size: 3rem;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    .overs-label-inline {
      font-size: 0.75rem;
      color: #8888aa;
      margin-top: 2px;
    }

    .btn-ball {
      width: 100%;
      padding: 14px;
      font-size: 1.2rem;
      background: linear-gradient(135deg, #a83a70, #b03050);
      color: #f0d0e0;
      box-shadow: 0 2px 12px rgba(168, 58, 112, 0.2);
    }

    .btn-ball:active {
      box-shadow: 0 1px 6px rgba(168, 58, 112, 0.3);
    }

    .ball-buttons {
      display: flex;
      gap: 10px;
    }

    .btn-ball-main {
      flex: 1;
    }

    .btn-ball-undo {
      width: 64px;
      padding: 14px 0;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #888;
    }

    /* Reset */
    .btn-reset {
      width: 100%;
      padding: 14px;
      font-size: 0.9rem;
      background: rgba(180, 50, 50, 0.1);
      border: 1px solid rgba(180, 50, 50, 0.2);
      color: #c45050;
      letter-spacing: 1px;
    }

    .btn-reset:active {
      background: rgba(180, 50, 50, 0.2);
    }

    .footer {
      text-align: center;
      padding: 8px 0 calc(env(safe-area-inset-bottom, 0px) + 8px);
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 0.5px;
    }

    .footer a {
      color: #666;
      text-decoration: none;
    }

    /* Mobile adjustments */
    @media (max-width: 400px) {
      .score-display {
        font-size: 3.5rem;
      }
      .overs-big {
        font-size: 2.5rem;
      }
      .wickets-display {
        font-size: 2.5rem;
      }
      h1 {
        font-size: 1.4rem;
      }
    }

    @media (hover: none) and (pointer: coarse) {
      .btn:active {
        transform: scale(0.93);
      }
    }

    /* Confirm dialog */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.7);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }

    .overlay.visible {
      display: flex;
    }

    .dialog {
      background: #1a1a2e;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 28px 24px;
      width: 90%;
      max-width: 340px;
      text-align: center;
    }

    .dialog p {
      font-size: 1.1rem;
      margin-bottom: 20px;
      color: #ccc;
    }

    .dialog-buttons {
      display: flex;
      gap: 12px;
    }

    .dialog-buttons .btn {
      flex: 1;
      padding: 14px;
      font-size: 1rem;
    }

    .btn-cancel {
      background: rgba(255, 255, 255, 0.08);
      color: #aaa;
    }

    .btn-confirm {
      background: #ef4444;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <div class="container">
    <h1>Wicket Wizard<span>Umpire Scoreboard</span></h1>

    <!-- Score -->
    <div class="card">
      <div class="card-label">Total Runs</div>
      <div class="score-display" id="score">0</div>
      <div class="score-buttons">
        <button class="btn btn-run" id="btnPlus">+1</button>
        <button class="btn btn-run btn-four" id="btnFour">+4</button>
        <button class="btn btn-run btn-six" id="btnSix">+6</button>
        <button class="btn btn-minus" id="btnMinus">&minus;1</button>
      </div>
    </div>

    <!-- Overs -->
    <div class="card">
      <div class="card-label">Overs</div>
      <div class="overs-display">
        <div class="overs-big" id="overs">0.0</div>
        <div class="overs-label-inline" id="ballInfo">0 balls bowled</div>
      </div>
      <div class="ball-buttons">
        <button class="btn btn-ball btn-ball-main" id="btnBall">+ Ball</button>
        <button class="btn btn-ball-undo" id="btnBallUndo">&minus;1</button>
      </div>
    </div>

    <!-- Wickets -->
    <div class="card">
      <div class="card-label">Wickets</div>
      <div class="wickets-display" id="wickets">0</div>
      <div class="ball-buttons">
        <button class="btn btn-wicket btn-ball-main" id="btnWicket">+ Wicket</button>
        <button class="btn btn-wicket-undo" id="btnWicketUndo">&minus;1</button>
      </div>
    </div>

    <!-- Reset -->
    <button class="btn btn-reset" id="btnReset">RESET MATCH</button>

    <div class="footer">
      Developed by Kinjal Mistry &middot; <a href="mailto:kinjalthehero@gmail.com">kinjalthehero@gmail.com</a>
    </div>
  </div>

  <!-- Confirm Reset Dialog -->
  <div class="overlay" id="overlay">
    <div class="dialog">
      <p>Reset everything?</p>
      <div class="dialog-buttons">
        <button class="btn btn-cancel" id="btnCancel">Cancel</button>
        <button class="btn btn-confirm" id="btnConfirmReset">Reset</button>
      </div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'wicket_wizard_state';

    let state = loadState();

    const elScore = document.getElementById('score');
    const elOvers = document.getElementById('overs');
    const elBallInfo = document.getElementById('ballInfo');
    const elWickets = document.getElementById('wickets');
    const overlay = document.getElementById('overlay');

    function defaultState() {
      return { runs: 0, totalBalls: 0, wickets: 0 };
    }

    function loadState() {
      try {
        const saved = localStorage.getItem(STORAGE_KEY);
        if (saved) {
          const parsed = JSON.parse(saved);
          if (typeof parsed.runs === 'number' && typeof parsed.totalBalls === 'number') {
            if (typeof parsed.wickets !== 'number') parsed.wickets = 0;
            return parsed;
          }
        }
      } catch {}
      return defaultState();
    }

    function saveState() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function formatOvers(totalBalls) {
      const overs = Math.floor(totalBalls / 6);
      const balls = totalBalls % 6;
      return `${overs}.${balls}`;
    }

    function render() {
      elScore.textContent = state.runs;
      elOvers.textContent = formatOvers(state.totalBalls);
      elWickets.textContent = state.wickets;
      const plural = state.totalBalls === 1 ? 'ball' : 'balls';
      elBallInfo.textContent = `${state.totalBalls} ${plural} bowled`;
    }

    function addRuns(n) {
      state.runs += n;
      saveState();
      render();
    }

    document.getElementById('btnPlus').addEventListener('click', () => addRuns(1));
    document.getElementById('btnFour').addEventListener('click', () => addRuns(4));
    document.getElementById('btnSix').addEventListener('click', () => addRuns(6));

    document.getElementById('btnMinus').addEventListener('click', () => {
      if (state.runs > 0) {
        state.runs--;
        saveState();
        render();
      }
    });

    document.getElementById('btnWicket').addEventListener('click', () => {
      if (state.wickets < 10) {
        state.wickets++;
        saveState();
        render();
      }
    });

    document.getElementById('btnWicketUndo').addEventListener('click', () => {
      if (state.wickets > 0) {
        state.wickets--;
        saveState();
        render();
      }
    });

    // + Ball
    document.getElementById('btnBall').addEventListener('click', () => {
      state.totalBalls++;
      saveState();
      render();
    });

    // -1 Ball
    document.getElementById('btnBallUndo').addEventListener('click', () => {
      if (state.totalBalls > 0) {
        state.totalBalls--;
        saveState();
        render();
      }
    });

    // Reset flow
    document.getElementById('btnReset').addEventListener('click', () => {
      overlay.classList.add('visible');
    });

    document.getElementById('btnCancel').addEventListener('click', () => {
      overlay.classList.remove('visible');
    });

    document.getElementById('btnConfirmReset').addEventListener('click', () => {
      state = defaultState();
      localStorage.removeItem(STORAGE_KEY);
      overlay.classList.remove('visible');
      render();
    });

    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) overlay.classList.remove('visible');
    });

    render();
  </script>
</body>
</html>
